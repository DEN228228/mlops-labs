stages:
  prepare:
    cmd: python src/prepare.py --train_size 0.02 --test_size 0.005
    deps:
      - data/raw/cleaned_house_rent_data.csv
      - src/prepare.py
    outs:
      - data/processed/

  test_data:
    cmd: pytest test_data.py -v
    deps:
      - data/processed/
      - test_data.py

  train:
    cmd: python src/optimize.py
    deps:
      - data/processed/
      - src/optimize.py
      - config/
    outs: 
      - plots/
      - models/ 
    metrics:
      - metrics.json:
          cache: false 

  test_model:
    cmd: pytest test_model.py -v
    deps:
      - models/
      - metrics.json
      - test_model.py